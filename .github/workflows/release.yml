name: Release

on:
  push:
    branches: [main]

# Cancel in-flight release runs if a newer commit lands; we only ever
# want the most recent main to be the source of truth for "what's released".
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # changesets/action commits version bumps + tags
      pull-requests: write     # ...and opens the "Version Packages" PR
      id-token: write          # OIDC token for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history so changesets can compute changelogs accurately.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Node 24 bundles npm 11, which is required for OIDC trusted
          # publishing. Node 22 ships npm 10, which silently falls back to
          # anonymous and gets a misleading 404 from the registry.
          node-version: 24
          cache: pnpm
          # Required for npm OIDC trusted publishing: the .npmrc auth-resolution
          # path keys off this registry URL during the token exchange.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # flame-react and flame-edge import types from @cuped-io/flame's built
      # dist; the release script builds everything but changesets/action
      # may inspect packages before that runs.
      - name: Build @cuped-io/flame
        run: pnpm --filter @cuped-io/flame build

      - name: Create Release PR or Publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # No NPM_TOKEN — auth comes from the OIDC token via id-token: write
          # and the trusted-publisher config on npmjs.com.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
