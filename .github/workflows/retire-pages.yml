name: retire-pages

# One-off (flame#25, RUNBOOK_CDN_CUTOVER.md §7): delete the legacy
# Cloudflare Pages project now that cdn.cuped.io serves from R2. Uses the
# legacy CLOUDFLARE_* secrets, which point at the account that hosted the
# Pages project. This workflow is removed again right after it has run.

on: workflow_dispatch

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete the "flame" Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          echo "Projects before:"
          curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$base" | jq -r '.result[].name'
          echo "Deleting: flame"
          curl -sf -X DELETE -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$base/flame" | jq '{success, errors}'
          echo "Projects after:"
          curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$base" | jq -r '.result[].name // "(none)"'
