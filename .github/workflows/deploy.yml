name: CI

# CI only — build/typecheck/lint/test. CDN publishing lives in release.yml,
# gated on an actual changesets release (ADR-0022): publishing from every
# main push both fought R2's write-once pins (same version, different bytes
# between releases) and served unreleased code on the floating flame.js.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # flame-react and flame-edge import types from @cuped-io/flame's built
      # dist (per its package.json `exports.types`), so the SDK has to be
      # built before downstream packages can typecheck.
      - name: Build @cuped-io/flame (provides types for downstream packages)
        run: pnpm --filter @cuped-io/flame build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
